<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 260px;
            background: #141414;
            color: #fff;
            font-family: 'Netflix Sans', Arial, sans-serif;
            padding: 16px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .logo {
            color: #e50914;
            font-size: 20px;
            font-weight: bold;
        }

        .title {
            font-size: 13px;
            color: #aaa;
        }

        /* Toggle */
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .label {
            font-size: 14px;
        }

        .sublabel {
            font-size: 11px;
            color: #888;
            margin-top: 2px;
        }

        .switch {
            position: relative;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            inset: 0;
            background: #333;
            border-radius: 24px;
            cursor: pointer;
            transition: 0.3s;
        }

        .slider:before {
            content: "";
            position: absolute;
            width: 18px;
            height: 18px;
            left: 3px;
            top: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }

        input:checked+.slider {
            background: #e50914;
        }

        input:checked+.slider:before {
            transform: translateX(20px);
        }

        /* Dropdown */
        .select-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
        }

        select {
            width: 100%;
            padding: 8px 10px;
            background: #222;
            color: #fff;
            border: 1px solid #333;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            outline: none;
        }

        select:focus {
            border-color: #e50914;
        }

        option {
            background: #222;
        }

        .status {
            margin-top: 14px;
            padding: 8px;
            border-radius: 6px;
            font-size: 12px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .status.on {
            background: #0a1a10;
            color: #0bc957;
            border: 1px solid #0bc95733;
        }

        .status.off {
            background: #1a1a1a;
            color: #555;
            border: 1px solid #2a2a2a;
        }

        .status.translating {
            background: #1a0f00;
            color: #ff9500;
            border: 1px solid #ff950033;
        }

        .spinner {
            width: 12px;
            height: 12px;
            border: 2px solid #ff950033;
            border-top-color: #ff9500;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Reload banner */
        .reload-banner {
            display: none;
            background: #1a0a0a;
            border: 1px solid #e5091466;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 12px;
            text-align: center;
            animation: slideDown 0.2s ease;
        }

        .reload-banner.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .reload-banner p {
            font-size: 12px;
            color: #ccc;
            margin-bottom: 8px;
        }

        .reload-banner .btn-row {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .reload-banner button {
            padding: 5px 16px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-yes {
            background: #e50914;
            color: #fff;
        }

        .btn-no {
            background: #333;
            color: #aaa;
        }

        .btn-yes:hover {
            background: #f6121d;
        }

        .btn-no:hover {
            background: #444;
        }
    </style>
</head>

<body>
    <div class="reload-banner" id="reloadBanner">
        <p>Reload Netflix tab to apply changes?</p>
        <div class="btn-row">
            <button class="btn-yes" id="btnYes">Reload</button>
            <button class="btn-no" id="btnNo">Later</button>
        </div>
    </div>

    <div class="header">
        <span class="logo">N</span>
        <div>
            <div style="font-size:14px;font-weight:bold;">Translate Subtitles</div>
        </div>
    </div>

    <div class="row">
        <div>
            <div class="label">Enable Translation</div>
            <div class="sublabel">Translate subtitles on Netflix</div>
        </div>
        <label class="switch">
            <input type="checkbox" id="toggle" />
            <span class="slider"></span>
        </label>
    </div>

    <div class="select-label">Language</div>
    <select id="language">
        <optgroup label="🇮🇳 Indian Languages">
            <option value="hi">Hindi — हिन्दी</option>
            <option value="bn">Bengali — বাংলা</option>
            <option value="te">Telugu — తెలుగు</option>
            <option value="mr">Marathi — मराठी</option>
            <option value="ta">Tamil — தமிழ்</option>
            <option value="ur">Urdu — اردو</option>
            <option value="gu">Gujarati — ગુજરાતી</option>
            <option value="kn">Kannada — ಕನ್ನಡ</option>
            <option value="ml">Malayalam — മലയാളം</option>
            <option value="pa">Punjabi — ਪੰਜਾਬੀ</option>
            <option value="or">Odia — ଓଡ଼ିଆ</option>
            <option value="as">Assamese — অসমীয়া</option>
            <option value="sd">Sindhi — سنڌي</option>
            <option value="ne">Nepali — नेपाली</option>
        </optgroup>
        <optgroup label="🌍 Other Languages">
            <option value="en">English (original)</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="zh">Chinese</option>
            <option value="ar">Arabic</option>
        </optgroup>
    </select>

    <div class="status off" id="status">Translation disabled</div>

    <script src="popup.js"></script>
</body>

</html>
